<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      id="favicon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%23333'>L</text></svg>"
    />
    <title>Schedule Management - Letsee</title>
  </head>

  <body>
    <header class="header">
      <div class="header-left">
        <div class="date-nav">
          <button class="nav-btn" onclick="changeMonth(-1)" title="Previous month">←</button>
          <button
            class="btn-primary date-display-btn"
            id="month-year-display"
            onclick="toggleDatePicker()"
            title="Click to open date picker"
          ></button>
          <div id="custom-date-picker" class="custom-date-picker" style="display: none">
            <div class="date-picker-header">
              <button class="date-picker-nav" onclick="changeMonth(-1)">←</button>
              <div class="date-picker-month-year">
                <select id="picker-month" onchange="updateDatePickerCalendar()">
                  <option value="0">January</option>
                  <option value="1">February</option>
                  <option value="2">March</option>
                  <option value="3">April</option>
                  <option value="4">May</option>
                  <option value="5">June</option>
                  <option value="6">July</option>
                  <option value="7">August</option>
                  <option value="8">September</option>
                  <option value="9">October</option>
                  <option value="10">November</option>
                  <option value="11">December</option>
                </select>
                <input
                  type="number"
                  id="picker-year"
                  min="2000"
                  max="2100"
                  onchange="updateDatePickerCalendar()"
                />
              </div>
              <button class="date-picker-nav" onclick="changeMonth(1)">→</button>
            </div>
            <div class="date-picker-weekdays">
              <div class="weekday">Sun</div>
              <div class="weekday">Mon</div>
              <div class="weekday">Tue</div>
              <div class="weekday">Wed</div>
              <div class="weekday">Thu</div>
              <div class="weekday">Fri</div>
              <div class="weekday">Sat</div>
            </div>
            <div id="picker-days" class="date-picker-days"></div>
          </div>
          <button class="nav-btn" onclick="changeMonth(1)" title="Next month">→</button>
        </div>
        <div class="header-info">
          <span>Schedule Management</span>
        </div>
        <!-- <div class="calendar-legend">
                <div class="legend-item"><span class="shift-badge shift-a">A</span> Morning</div>
                <div class="legend-item"><span class="shift-badge shift-m">M</span> Middle</div>
                <div class="legend-item"><span class="shift-badge shift-b">B</span> Late</div>
                <div class="legend-item"><span class="shift-badge shift-c">C</span> Night</div>
            </div> -->
      </div>
      <div class="header-right">
        <div class="time-display" id="current-time">00:00</div>
        <button
          class="theme-toggle"
          id="theme-toggle-btn"
          onclick="toggleTheme()"
          title="Toggle theme (Ctrl+K)"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
        <button
          class="btn-primary"
          id="manage-staff-btn"
          onclick="openPeopleModal()"
          title="Manage Staff"
        >
          Staff
        </button>
        <a href="/" class="btn-primary" title="Back to Handovers"> ← Back </a>
        <button class="btn-primary" onclick="changeMyPassword()" title="Change your password" style="margin-right: 8px;">Change Password</button>
        <button class="btn-primary logout-btn" onclick="handleLogout()" title="Sign out">
          Sign Out
        </button>
      </div>
    </header>

    <main class="schedule-main">
      <div class="schedule-container">
        <!-- Calendar Section - Full Width -->
        <div class="schedule-calendar full-width">
          <div class="calendar-weekdays">
            <div class="weekday">Sun</div>
            <div class="weekday">Mon</div>
            <div class="weekday">Tue</div>
            <div class="weekday">Wed</div>
            <div class="weekday">Thu</div>
            <div class="weekday">Fri</div>
            <div class="weekday">Sat</div>
          </div>

          <div id="calendar-grid" class="calendar-grid">
            <!-- Calendar days will be rendered here -->
          </div>
        </div>
      </div>
    </main>

    <!-- Day Details Hover Preview (styled like example) -->
    <div id="hover-preview" class="hover-preview" style="display: none">
      <div class="hover-preview-dialog">
        <div class="hover-preview-header">
          <span class="hover-preview-day" id="hover-preview-day"></span>
          <span class="hover-preview-month" id="hover-preview-month"></span>
        </div>
        <div id="hover-preview-content" class="hover-preview-content">
          <!-- Staff assignments will be rendered here -->
        </div>
        <div id="hover-preview-pagination" class="hover-preview-pagination" style="display: none">
          <button class="preview-page-btn" id="preview-page-prev">‹</button>
          <span class="preview-page-label" id="preview-page-label"></span>
          <button class="preview-page-btn" id="preview-page-next">›</button>
        </div>
      </div>
    </div>

    <!-- Day Edit Modal -->
    <div id="day-modal" class="modal-overlay" style="display: none" onclick="closeDayModal(event)">
      <div class="modal-dialog modal-compact" onclick="event.stopPropagation()">
        <div id="modal-content" class="modal-content">
          <!-- Shifts and staff will be rendered here -->
        </div>
      </div>
    </div>

    <div
      id="confirm-modal"
      class="modal-overlay"
      style="display: none"
      onclick="closeConfirmModal()"
    >
      <div class="modal-dialog" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2 id="confirm-title">Confirm</h2>
        </div>
        <div class="modal-body">
          <p id="confirm-message"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeConfirmModal()">Cancel</button>
          <button class="btn-danger" id="confirm-btn" onclick="executeConfirmAction()">
            Confirm
          </button>
        </div>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div id="password-modal" class="modal-overlay" style="display: none" onclick="closeChangePasswordModal()">
      <div class="modal-dialog" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Change Password</h2>
        </div>
        <div class="modal-body">
          <form id="password-form" class="password-form" onsubmit="event.preventDefault(); submitChangePassword();">
            <div class="form-row">
              <input
                type="password"
                id="current-password"
                placeholder="Current Password"
                class="form-input"
                autocomplete="current-password"
                required
              />
            </div>
            <div class="form-row">
              <input
                type="password"
                id="new-password"
                placeholder="New Password (min 8 characters)"
                class="form-input"
                autocomplete="new-password"
                required
              />
            </div>
            <div class="form-row">
              <input
                type="password"
                id="confirm-password"
                placeholder="Confirm New Password"
                class="form-input"
                autocomplete="new-password"
                required
              />
            </div>
            <div id="password-error" style="color: #e74c3c; font-size: 12px; margin-top: 4px; display: none;"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeChangePasswordModal()">Cancel</button>
          <button type="button" class="btn-primary" onclick="submitChangePassword()">Change Password</button>
        </div>
      </div>
    </div>

    <!-- People Management Modal (synced with index.html) -->
    <div id="people-modal" class="modal-overlay" style="display: none" onclick="closePeopleModal()">
      <div class="modal-dialog modal-large staff-modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Manage Staff</h2>
          <button class="close-btn" onclick="closePeopleModal()">×</button>
        </div>
        <div class="modal-body staff-modal-body">
          <!-- Staff List Section -->
          <div class="staff-list-section">
            <div class="staff-list-header">
              <div class="staff-list-title">
                Staff <span id="staff-count"></span>
              </div>
              <input
                type="text"
                id="staff-search"
                class="form-input staff-search"
                placeholder="Search name or position..."
                oninput="filterStaffList()"
              />
            </div>
            <div class="people-list" id="people-list">
              <!-- People rendered here by JS -->
            </div>
          </div>

          <!-- Add / Edit Form -->
          <form class="staff-form" id="person-form" onsubmit="event.preventDefault(); savePerson();">
            <div class="staff-form-header">
              <h3 id="person-form-title">Add New Staff Member</h3>
              <button type="button" class="btn-secondary btn-small" id="cancel-person-edit" onclick="cancelPersonEdit()" style="display: none;">Cancel Edit</button>
            </div>

            <div class="form-grid">
              <!-- Name -->
              <div class="form-field full">
                <label for="new-person-name">Full Name</label>
                <input type="text" id="new-person-name" class="form-input" placeholder="Full name" required />
              </div>

              <!-- Position (custom dropdown with built-in search) -->
              <div class="form-field">
                <label>Position</label>
                <div class="position-input-row">
                  <div class="position-dropdown-wrapper">
                    <div class="position-selected" id="position-selected" onclick="togglePositionDropdown()">
                      <span id="position-selected-text">— No position —</span>
                      <span class="dropdown-arrow">▼</span>
                    </div>
                    <div class="position-dropdown" id="position-dropdown">
                      <input type="text" id="position-search" class="form-input" placeholder="Search positions..." oninput="filterPositionDropdown()" />
                      <div class="position-options" id="position-options"></div>
                    </div>
                  </div>
                  <button type="button" class="btn-secondary btn-small" onclick="addNewPositionFromInput()">+ New</button>
                </div>
                <input type="hidden" id="new-person-position-id" />
              </div>

              <!-- Color -->
              <div class="form-field">
                <label>Color</label>
                <input type="hidden" id="new-person-color" value="#3498db" />
                <div class="preset-color-picker" id="new-person-color-picker" aria-label="Choose staff color"></div>
              </div>

              <!-- Login credentials -->
              <div class="form-field full credentials">
                <label for="new-person-email">Email (for login account)</label>
                <div class="form-row tight">
                  <input type="email" id="new-person-email" class="form-input" placeholder="name@company.com" autocomplete="email" />
                  <input type="password" id="new-person-password" class="form-input" placeholder="Password (min 8)" autocomplete="new-password" />
                </div>
                <!-- <div class="field-hint" id="person-account-hint">Leave blank to create a non-login staff record. Password resets only on edit.</div> -->
              </div>

              <!-- Flags -->
              <div class="form-field">
                <button type="button" id="admin-toggle-btn" class="btn-secondary btn-small" onclick="toggleFormAdmin()">Make Admin</button>
                <input type="hidden" id="new-person-is-admin" value="false" />
              </div>
              <!-- Active toggle is now in the list next to delete (per requirements) -->
            </div>

            <div class="staff-form-actions">
              <button type="submit" class="btn-primary" id="save-person-btn">+ Add Staff</button>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn-secondary" onclick="closePeopleModal()">Close</button>
          <button class="btn-primary" onclick="closePeopleModal()">Done</button>
        </div>
      </div>
    </div>

    <!-- Error Handler (load first) -->
    <script src="js/error-handler.js"></script>

    <!-- State Management -->
    <script src="js/store.js"></script>

    <!-- Utilities -->
    <script src="js/utils.js"></script>

    <!-- API Client -->
    <script src="js/api.js"></script>

    <!-- Modules -->
    <script src="js/people.js"></script>

    <!-- Schedule Page -->
    <script src="js/schedule.js"></script>
  </body>
</html>
